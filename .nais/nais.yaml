apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: dp-aktivitetslogg
  namespace: teamdagpenger
  labels:
    team: teamdagpenger
spec:
  image: "{{ image }}"
  port: 8080
  prometheus:
    enabled: true
    path: /metrics
  liveness:
    path: /isalive
  readiness:
    path: /isready
  startup:
    path: /isready
  replicas:
    min: 1
    max: 1
  resources:
    limits:
      memory: 512Mi
    requests:
      cpu: 200m
      memory: 256Mi
  {{ ingresses }}
  env:
    - name: KAFKA_RAPID_TOPIC
      value: teamdagpenger.rapid.v1
    - name: KAFKA_CONSUMER_GROUP_ID
      value: dp-aktivitetslogg-v3
    - name: KAFKA_RESET_POLICY
      value: earliest
    - name: FLYWAY_CLEAN_DISABLED
      value: "true"
  kafka:
    pool: "{{ kafka_pool }}"
  gcp:
    sqlInstances:
      - type: POSTGRES_18
        highAvailability: true
        diskAutoresize: true
        pointInTimeRecovery: true
        tier: "{{gcp.sql.tier}}"
        databases:
          - name: aktivitetslogg
            envVarPrefix: DB
  azure:
    application:
      enabled: true
      allowAllUsers: false
      tenant: {{azure.tenant}}
      claims:
        groups:
          - id: {{azure.grupper.saksbehandler}}
  accessPolicy:
    inbound:
      rules:
        - application: dp-aktivitetslogg-frontend
        {{#if wonderwalled}}
        - application: wonderwalled-azure
          namespace: nais
       {{/if}}
  observability:
    logging:
      destinations:
        - id: loki
        - id: elastic
    autoInstrumentation:
      enabled: true
      runtime: java
